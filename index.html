<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔮 Chiromancie Magique</title><style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #22103c, #090510);
    color: #f3e8ff;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: auto;
    background: rgba(20, 15, 40, 0.88);
    border-radius: 40px;
    padding: 25px;
    border: 1px solid rgba(200,160,255,0.4);
    backdrop-filter: blur(8px);
}

h1 {
    text-align: center;
    font-size: 2.7rem;
    margin-bottom: 10px;
    background: linear-gradient(90deg,#ffe39d,#d09cff);
    -webkit-background-clip: text;
    color: transparent;
}

.sub {
    text-align: center;
    color: #c9b6ff;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

.card {
    background: rgba(35,25,60,0.7);
    border-radius: 30px;
    padding: 20px;
    border: 1px solid rgba(200,180,255,0.2);
}

video,
canvas {
    width: 100%;
    max-width: 500px;
    border-radius: 25px;
    border: 3px solid #b77eff;
    background: #10091f;
}

canvas {
    display: none;
}

button {
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    margin: 8px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg,#7a3cff,#b26dff);
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #b77eff;
}

.result-card {
    background: linear-gradient(145deg,#151028,#0c0819);
    border-radius: 28px;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 8px solid #cb9eff;
}

.hand-icon {
    font-size: 4rem;
    text-align: center;
}

.wizard-name {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    margin-top: 10px;
    background: linear-gradient(90deg,#fff0b2,#d8b3ff);
    -webkit-background-clip: text;
    color: transparent;
}

.badge {
    display: inline-block;
    background: #2d2250;
    padding: 6px 14px;
    border-radius: 999px;
    margin: 5px;
    font-size: 0.85rem;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.stat {
    background: #100c21;
    padding: 14px;
    border-radius: 20px;
    border-left: 3px solid #9d72ff;
}

.gauge {
    height: 10px;
    background: #2a2044;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 8px;
}

.gauge-fill {
    height: 100%;
    background: linear-gradient(90deg,#d5adff,#8f5dff);
}

.prediction {
    margin-top: 20px;
    background: #1b1434;
    border-radius: 24px;
    padding: 18px;
    border: 1px dashed #b57cff;
    line-height: 1.7;
}

.instruction {
    margin-top: 18px;
    text-align: center;
    color: #c9b6ff;
    font-size: 0.9rem;
}

.small {
    margin-top: 20px;
    text-align: center;
    font-size: 0.75rem;
    color: #9d8ec4;
}

@media(max-width: 900px){
    .grid {
        grid-template-columns: 1fr;
    }
}
</style></head>
<body><div class="container"><h1>🖐️ CHIROMANCIE MAGIQUE</h1>
<div class="sub">Analyse mystique dynamique de la paume</div><div class="grid"><div class="card" style="text-align:center;"><h2>📸 Présentez votre main</h2>
<br><video id="webcam" autoplay playsinline muted></video> <canvas id="canvas"></canvas>

<div>
<button id="captureBtn">🔮 Capturer & Analyser</button>
<button id="switchBtn">🔄 Caméra</button>
<button id="resetBtn">🌀 Reset</button>
</div><div class="instruction">
✨ Placez votre paume bien ouverte<br>
💡 Une bonne lumière améliore la lecture magique
</div></div><div class="card" id="resultContainer"><div class="result-card">
<div class="hand-icon">🖐️❓</div>
<div class="wizard-name">En attente</div>
<div style="text-align:center;margin-top:10px;">
Capturez votre main pour révéler votre destinée.
</div>
</div></div></div>
</div><script>

let stream;
let currentFacingMode = "user";

const ARCHETYPES = {

VISIONNAIRE: {
    name: "Le Visionnaire",
    icon: "👁️🔮",
    traits: ["Intuition", "Clairvoyance", "Esprit"],
    desc: "Votre esprit perçoit des choses invisibles aux autres.",
    conseil: "Suivez vos intuitions profondes."
},

PASSIONNE: {
    name: "Le Passionné",
    icon: "❤️🔥",
    traits: ["Émotions", "Charisme", "Feu intérieur"],
    desc: "Vos émotions alimentent une puissance rare.",
    conseil: "Vos sentiments sont votre force."
},

VITAL: {
    name: "Le Vital",
    icon: "🌿💪",
    traits: ["Résistance", "Vitalité", "Énergie"],
    desc: "Votre énergie vitale semble inépuisable.",
    conseil: "Canalisez votre force naturelle."
},

MYSTIQUE: {
    name: "Le Mystique",
    icon: "🌙🌀",
    traits: ["Mystère", "Équilibre", "Secrets"],
    desc: "Votre paume cache des symboles anciens.",
    conseil: "Acceptez l'inconnu."
},

GUERRIER: {
    name: "Le Guerrier",
    icon: "⚔️🛡️",
    traits: ["Action", "Protection", "Force"],
    desc: "Votre énergie évoque les anciens protecteurs.",
    conseil: "Agissez avec détermination."
},

SAGE: {
    name: "Le Sage",
    icon: "📜✨",
    traits: ["Connaissance", "Réflexion", "Savoir"],
    desc: "Votre esprit cherche sans cesse la vérité.",
    conseil: "Partagez votre sagesse."
},

ELEMENTAIRE: {
    name: "L'Élémentaliste",
    icon: "🌊🔥",
    traits: ["Nature", "Chaos", "Éléments"],
    desc: "Votre paume réagit fortement aux forces naturelles.",
    conseil: "Écoutez les éléments autour de vous."
},

OMBRE: {
    name: "L'Ombre",
    icon: "🌑🗡️",
    traits: ["Secret", "Nuit", "Silence"],
    desc: "Votre énergie demeure difficile à lire.",
    conseil: "Votre discrétion est un pouvoir."
},

DESTIN: {
    name: "Le Façonneur",
    icon: "⭐🔗",
    traits: ["Destin", "Leadership", "Influence"],
    desc: "Votre paume révèle une destinée exceptionnelle.",
    conseil: "Assumez votre rôle."
}

};

async function startCamera(){

    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: currentFacingMode
            }
        });

        const video = document.getElementById('webcam');
        video.srcObject = stream;

    } catch(e){
        alert('Impossible d’accéder à la caméra');
    }
}

async function switchCamera(){
    currentFacingMode = currentFacingMode === 'user'
        ? 'environment'
        : 'user';

    await startCamera();
}

function captureHand(){

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');

    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    return ctx.getImageData(0,0,canvas.width,canvas.height);
}

function analyzeHandLines(imageData,width,height){

    const data = imageData.data;

    const gray = new Array(width * height);

    for(let i=0;i<width*height;i++){
        gray[i] = (
            data[i*4] +
            data[i*4+1] +
            data[i*4+2]
        ) / 3;
    }

    const edges = new Array(width * height).fill(0);

    let totalEdges = 0;

    for(let y=1;y<height-1;y++){
        for(let x=1;x<width-1;x++){

            const idx = y * width + x;

            const gx = gray[idx+1] - gray[idx-1];
            const gy = gray[idx+width] - gray[idx-width];

            const magnitude = Math.sqrt(gx*gx + gy*gy);

            edges[idx] = magnitude;
            totalEdges += magnitude;
        }
    }

    const avgEdges = totalEdges / (width * height);

    function zoneStats(yStart,yEnd){

        let energy = 0;
        let strongLines = 0;
        let darkPixels = 0;
        let variance = 0;
        let count = 0;

        const values = [];

        for(let y=Math.floor(yStart); y<Math.floor(yEnd); y++){
            for(let x=Math.floor(width*0.2); x<Math.floor(width*0.8); x++){“

                const idx = Math.floor(y * width + x);

                const e = edges[idx];
                const g = gray[idx];

                energy += e;

                if(e > avgEdges * 1.4) strongLines++;
                if(g < 110) darkPixels++;

                values.push(e);
                count++;
            }
        }

        const mean = energy / count;

        for(const v of values){
            variance += Math.abs(v - mean);
        }

        variance /= count;

        return {
            energy,
            strongLines,
            darkPixels,
            variance,
            count
        };
    }

    const coeurZone = zoneStats(0,height*0.33);
    const teteZone = zoneStats(height*0.33,height*0.66);
    const vieZone = zoneStats(height*0.66,height);

    function computeScore(zone){

        let score = 0;

        score += (zone.energy / Math.max(1, zone.count)) * 0.4;
        score += zone.strongLines * 0.002;
        score += zone.darkPixels * 0.0008;
        score += zone.variance * 0.5;

        score = Math.floor(score);

        // Évite les valeurs infinies ou NaN
        if(isNaN(score) || !isFinite(score)){
            score = 50;
        }

        return Math.max(10, Math.min(95, score));
    }

    let coeur = computeScore(coeurZone);
    let tete = computeScore(teteZone);
    let vie = computeScore(vieZone);

    let brightness = 0;

    for(let i=0;i<gray.length;i+=50){
        brightness += gray[i];
    }

    brightness /= Math.max(1, (gray.length / 50));

    const texture = avgEdges;

    let leftEnergy = 0;
    let rightEnergy = 0;

    for(let y=0;y<height;y++){
        for(let x=0;x<width;x++){

            const idx = y * width + x;

            if(x < width/2) leftEnergy += edges[idx];
            else rightEnergy += edges[idx];
        }
    }

    const asymmetry = Math.abs(leftEnergy - rightEnergy);

    coeur += Math.floor((brightness - 120) / 20);
    tete += Math.floor(texture / 30);
    vie += Math.floor(asymmetry / 120000);

    coeur = Math.max(10, Math.min(95, coeur));
    tete = Math.max(10, Math.min(95, tete));
    vie = Math.max(10, Math.min(95, vie));

    const ratio = width / height;

    let handShape;

    if(ratio > 0.9) handShape = 'carrée';
    else if(ratio > 0.75) handShape = 'équilibrée';
    else handShape = 'longue';

    const scores = [
        {key:'PASSIONNE', value: coeur},
        {key:'VISIONNAIRE', value: tete},
        {key:'VITAL', value: vie}
    ];

    scores.sort((a,b)=>b.value-a.value);

    let archetypeKey = scores[0].key;

    if(Math.abs(coeur-tete)<8 && Math.abs(tete-vie)<8){
        archetypeKey = 'MYSTIQUE';
    }

    if(handShape === 'carrée' && vie > 60){
        archetypeKey = 'GUERRIER';
    }

    if(handShape === 'longue' && tete > 65){
        archetypeKey = 'SAGE';
    }

    if(texture > 40 && coeur > 55 && vie > 55){
        archetypeKey = 'ELEMENTAIRE';
    }

    if(asymmetry > 2500000){
        archetypeKey = 'OMBRE';
    }

    if(vie > 80 && tete > 75){
        archetypeKey = 'DESTIN';
    }

    const aura = [
        'Feu Astral',
        'Brume Lunaire',
        'Éther Doré',
        'Néant Violet',
        'Souffle Solaire',
        'Tempête Runique'
    ];

    const rune = ['ᚠ','ᚢ','ᚦ','ᚱ','ᚲ','ᛉ','ᛟ'];

    return {

        archetype: ARCHETYPES[archetypeKey],

        lines: {
            coeur,
            tete,
            vie
        },

        hand: {
            forme: handShape
        },

        aura: aura[Math.floor(texture) % aura.length],

        rune: rune[Math.floor(brightness) % rune.length],

        metrics: {
            texture: Math.floor(texture),
            asymmetry: Math.floor(asymmetry / 1000),
            brightness: Math.floor(brightness)
        }
    };
}

function generatePrediction(lines,hand,analysis){

    const coeurText = [
        'Votre aura émotionnelle attire les âmes perdues.',
        'Les émotions guident vos décisions secrètes.',
        'Votre cœur agit avant votre esprit.',
        'Vous cachez une puissance affective rare.'
    ];

    const teteText = [
        'Votre esprit voit ce que les autres ignorent.',
        'Les symboles anciens vous parlent naturellement.',
        'Votre intuition dépasse souvent la logique.',
        'Vous percevez les motifs cachés du destin.'
    ];

    const vieText = [
        'Votre énergie semble inépuisable.',
        'Vous traversez les épreuves avec une force étrange.',
        'Votre présence influence votre entourage.',
        'Votre vitalité possède quelque chose d’anormal.'
    ];

    function pick(arr,seed){
        return arr[seed % arr.length];
    }

    const text = [];

    text.push(pick(coeurText,lines.coeur));
    text.push(pick(teteText,lines.tete));
    text.push(pick(vieText,lines.vie));

    text.push(`Aura détectée : ${analysis.aura}`);
    text.push(`Rune dominante : ${analysis.rune}`);

    if(analysis.metrics.texture > 45){
        text.push('Les lignes de votre paume semblent particulièrement agitées.');
    }

    if(analysis.metrics.brightness < 100){
        text.push('Une énergie nocturne entoure votre destinée.');
    }

    if(analysis.metrics.asymmetry > 1500){
        text.push('Votre chemin de vie semble imprévisible.');
    }

    return text.join(' ');
}

function renderAnalysis(analysis){

    const arch = analysis.archetype;
    const lines = analysis.lines;
    const hand = analysis.hand;

    const prediction = generatePrediction(lines,hand,analysis);

    const container = document.getElementById('resultContainer');

    container.innerHTML = `

    <div class="result-card">

        <div class="hand-icon">${arch.icon}</div>

        <div class="wizard-name">${arch.name}</div>

        <div style="text-align:center;margin-top:10px;">
            ${arch.traits.map(t=>`<span class="badge">${t}</span>`).join('')}
        </div>

        <div style="margin-top:15px;line-height:1.6;">
            ${arch.desc}
        </div>

    </div>

    <div class="stats-grid">

        <div class="stat">
            ❤️ Ligne de cœur : ${lines.coeur}%
            <div class="gauge">
                <div class="gauge-fill" style="width:${lines.coeur}%"></div>
            </div>
        </div>

        <div class="stat">
            🧠 Ligne de tête : ${lines.tete}%
            <div class="gauge">
                <div class="gauge-fill" style="width:${lines.tete}%"></div>
            </div>
        </div>

        <div class="stat">
            🌿 Ligne de vie : ${lines.vie}%
            <div class="gauge">
                <div class="gauge-fill" style="width:${lines.vie}%"></div>
            </div>
        </div>

        <div class="stat">
            🖐️ Main : ${hand.forme}
        </div>

    </div>

    <div class="prediction">
        🔮 ${prediction}
        <br><br>
        ✨ Conseil mystique : ${arch.conseil}
    </div>

    <div class="small">
        Analyse basée sur les contrastes, textures et symétries de la paume.
    </div>

    `;
}

async function performReading(){

    const imgData = captureHand();

    if(!imgData){
        alert('Impossible de capturer la main');
        return;
    }

    const btn = document.getElementById('captureBtn');

    btn.disabled = true;
    btn.innerHTML = '🔍 Lecture magique...';

    await new Promise(r=>setTimeout(r,900));

    const analysis = analyzeHandLines(
        imgData,
        imgData.width,
        imgData.height
    );

    renderAnalysis(analysis);

    btn.disabled = false;
    btn.innerHTML = '🔮 Capturer & Analyser';

    if(navigator.vibrate){
        navigator.vibrate(100);
    }
}

window.addEventListener('load', async ()=>{

    await startCamera();

    document
        .getElementById('captureBtn')
        .addEventListener('click',performReading);

    document
        .getElementById('switchBtn')
        .addEventListener('click',switchCamera);

    document
        .getElementById('resetBtn')
        .addEventListener('click',()=>location.reload());
});

window.addEventListener('beforeunload',()=>{
    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }
});

</script></body>
</html>
