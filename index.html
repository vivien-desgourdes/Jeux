<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 STAR CLICKER - DESTINY</title>
<link rel="manifest" href="Manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:#ffd234; --orange:#ff8c42; --pink:#ff5fa0;
  --purple:#a855f7; --blue:#3b82f6; --green:#22c55e;
  --shadow:0 4px 0 rgba(0,0,0,.12),0 8px 24px rgba(0,0,0,.08);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,#fff1fa 0%,#e8f4ff 50%,#f0fff4 100%);
  min-height:100vh; color:#2d2d4e; overflow-x:hidden;
  user-select: none;
}
#toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { background: rgba(45, 45, 78, 0.95); color: white; padding: 12px 25px; border-radius: 50px; font-family: 'Baloo 2', cursive; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 2px solid var(--yellow); animation: slideIn 0.5s ease-out, fadeOut 0.5s ease forwards 2.5s; text-align: center; min-width: 280px; }
@keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }

#app{ max-width:900px; margin:0 auto; padding:20px; display:grid; grid-template-columns: 1fr 320px; gap:20px; }
.card{background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
.card-title{font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; margin-bottom:15px;}
header { grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; }
.logo{ font-family:'Baloo 2',cursive; font-size:1.8rem; font-weight:800; background:linear-gradient(135deg,var(--orange),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-counter { font-family:'Baloo 2'; font-weight:800; color:var(--orange); font-size:1.2rem; min-width: 180px; text-align: right; }
.main-area{ display:flex; flex-direction:column; align-items:center; gap:20px; text-align:center; }
.score-number{ font-family:'Baloo 2',cursive; font-size:4.5rem; font-weight:800; color:#1e293b; line-height:1; }
.score-number.pop { animation: clickPop 0.1s ease-out; }
@keyframes clickPop { 50% { transform: scale(1.05); } }

.star-btn{ width:160px; height:160px; border-radius:50%; border:none; cursor:pointer; background:linear-gradient(145deg,var(--yellow),var(--orange)); box-shadow:0 8px 0 #c96a00, 0 15px 30px rgba(255,140,66,0.3); font-size:4.5rem; transition: 0.1s; outline: none !important; -webkit-tap-highlight-color: transparent; }
.star-btn:active{ transform:translateY(4px) scale(0.95); box-shadow:0 2px 0 #c96a00; }

.list-item{ display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:10px; border:2px solid #e2e8f0; border-radius:16px; cursor:pointer; transition:0.2s; }
.list-item:hover{ border-color:var(--blue); background:#f8fafc; }
.list-item.cant-afford{ opacity:0.5; pointer-events:none; filter: grayscale(0.8); }

.achievement-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: #f1f5f9; margin-bottom: 8px; filter: grayscale(1); opacity: 0.6; transition: 0.3s; border: 1px solid transparent; }
.achievement-item.unlocked { filter: grayscale(0); opacity: 1; background: #fffbeb; border-color: var(--yellow); }
.ach-icon { font-size: 1.5rem; }
.ach-info { flex: 1; }
.ach-name { font-weight: 800; font-size: 0.9rem; font-family: 'Baloo 2'; line-height: 1.2; }
.ach-desc { font-size: 0.75rem; color: #64748b; }

.item-icon{ font-size:2.2rem; }
.item-info{ flex:1; }
.item-name{ font-family:'Baloo 2'; font-weight:700; font-size:1rem; }
.item-cost{ font-size:0.85rem; color:#b45309; font-weight:700; }
.item-count{ font-family:'Baloo 2'; font-size:1.6rem; font-weight:800; color:var(--blue); }

.comet { position:fixed; font-size:3.5rem; cursor:pointer; z-index:1000; filter:drop-shadow(0 0 15px var(--yellow)); animation: fly 5s linear forwards; }
@keyframes fly { from{left:115%; top:-100px;} to{left:-100px; top:80%;} }
.footer-signature { grid-column: 1/-1; text-align: center; padding: 20px; font-family: 'Baloo 2', cursive; color: #94a3b8; font-size: 0.9rem; letter-spacing: 1px; }

@media(max-width:700px){ #app{ grid-template-columns:1fr; } header { flex-direction: column; gap:10px; } .header-counter{ text-align: center; } }
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app">
  <header class="card">
    <div class="logo">🌟 STAR CLICKER</div>
    <div class="header-counter">🪙 <span id="headerScore">0.00</span></div>
  </header>
  <div class="card main-area">
    <div><div class="score-number" id="score">0</div><p style="font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:1px;">Étoiles collectées</p></div>
    <button class="star-btn" id="clickBtn">⭐</button>
    <div style="font-weight:700; color:#64748b; line-height: 1.6;">
      🚀 Production : <span id="perSec" style="color:var(--blue); font-family:'Baloo 2'; font-size:1.2rem;">0</span> / sec<br>
      🖱️ Force du clic : <span id="clickVal" style="color:var(--pink); font-family:'Baloo 2';">1</span><br>
      📊 Clics totaux : <span id="totalClicks" style="color:var(--purple); font-family:'Baloo 2';">0</span>
    </div>
  </div>
  <div class="card"><div class="card-title">📖 GRIMOIRE DES ÉTOILES</div><div id="storyText" style="font-style: italic; color: #475569; min-height: 40px; line-height: 1.5;">Il était une fois...</div></div>
  <div class="card"><div class="card-title">⚙️ BOUTIQUE MAGIQUE</div><div id="genList"></div></div>
  <div class="card"><div class="card-title">⚔️ CHALLENGE BOSS</div><div id="BossList"></div></div>
  <div class="card"><div class="card-title">🏆 SUCCÈS (<span id="achCount">0</span>/31)</div><div id="SuccesList" style="max-height: 400px; overflow-y: auto;"></div></div>
 
  <footer class="footer-signature">✨ Créé par <strong>Vivien</strong> - 2026 ✨</footer>
</div>

<script>
const STORY_DATA = {
  'start': "Le ciel est noir. Cliquez sur l'étoile pour faire naître la première lueur...",
  'Fleur du Néant': "La Fleur du Néant s'est fanée. Sa poussière magique stabilise l'espace.",
  'Titan de Cristal': "Le Titan s'est brisé. La lumière se reflète désormais sur ses éclats.",
  'Gardien des Ombres': "L'ombre recule. Mais au cœur du soleil, une nouvelle menace s'éveille...",
  'Phénix Solaire': "Le Phénix a partagé ses flammes. Votre pouvoir de clic est désormais incandescent.",
  'Hydre d\'Émeraude': "L'Hydre est vaincue. La nature et la magie fusionnent dans tout l'univers.",
  'Ancien Dieu des Étoiles': "L'Ancien Dieu vous a légué son sceptre. Vous êtes l'architecte de l'Infini. Félicitations !"
};

const BOSS_DATA = [ 
  {id:'Fleur du Néant', emoji:'💀', name:'Fleur du Néant', cost:500000}, 
  {id:'Titan de Cristal', emoji:'👹', name:'Titan de Cristal', cost:2500000}, 
  {id:'Gardien des Ombres', emoji:'👽', name:'Gardien des Ombres', cost:10000000}, 
  {id:'Phénix Solaire', emoji:'🔥', name:'Phénix Solaire', cost:75000000}, 
  {id:'Hydre d\'Émeraude', emoji:'🐍', name:'Hydre d\'Émeraude', cost:250000000}, 
  {id:'Ancien Dieu des Étoiles', emoji:'👁️', name:'Dieu des Étoiles', cost:1000000000} 
];

const GEN_DATA = [ 
  {id:'fleur', emoji:'🌼', name:'fleur', base:1, cost:50}, 
  {id:'wand', emoji:'🪄', name:'Baguette', base:5, cost:100}, 
  {id:'fairy', emoji:'🧚', name:'Fée', base:30, cost:300}, 
  {id:'unicorn',emoji:'🦄', name:'Licorne', base:45, cost:2000}, 
  {id:'dragon', emoji:'🐉', name:'Dragon', base:200, cost:15000}, 
  {id:'castle', emoji:'🏰', name:'Château', base:1000, cost:100000} 
];

const ACHIEVEMENTS_DATA = [
  { id: 'click_1', emoji: '🖱️', name: 'Apprenti', desc: '100 clics', check: (s, g) => s.clicks >= 100 },
  { id: 'click_2', emoji: '⚡', name: 'Hyperactif', desc: '1 000 clics', check: (s, g) => s.clicks >= 1000 },
  { id: 'click_3', emoji: '🌀', name: 'Frénésie', desc: '5 000 clics', check: (s, g) => s.clicks >= 5000 },
  { id: 'click_4', emoji: '👑', name: 'Doigt d\'Or', desc: '10 000 clics', check: (s, g) => s.clicks >= 10000 },
  // Score
  { id: 'score_1', emoji: '💰', name: 'Petit pécule', desc: '10k Étoiles', check: (s, g) => s.score >= 10000 },
  { id: 'score_2', emoji: '💎', name: 'Fortune', desc: '1M Étoiles', check: (s, g) => s.score >= 1000000 },
  { id: 'score_3', emoji: '🔱', name: 'Milliardaire', desc: '1B Étoiles', check: (s, g) => s.score >= 1000000000 },
  // Bâtiments
  { id: 'fleur_10', emoji: '🌸', name: 'Jardinier', desc: '10 Fleurs', check: (s, g) => g.fleur >= 10 },
  { id: 'fleur_50', emoji: '🌿', name: 'Botaniste', desc: '50 Fleurs', check: (s, g) => g.fleur >= 50 },
  { id: 'wand_25', emoji: '🪄', name: 'Magicien', desc: '25 Baguettes', check: (s, g) => g.wand >= 25 },
  { id: 'wand_50', emoji: '🔮', name: 'Archimage', desc: '50 Baguettes', check: (s, g) => g.wand >= 50 },
  { id: 'fairy_25', emoji: '✨', name: 'Ami des Fées', desc: '25 Fées', check: (s, g) => g.fairy >= 25 },
  { id: 'fairy_100', emoji: '🧚', name: 'Roi des Pixels', desc: '100 Fées', check: (s, g) => g.fairy >= 100 },
  { id: 'uni_10', emoji: '🌈', name: 'Écurie Arc-en-ciel', desc: '10 Licornes', check: (s, g) => g.unicorn >= 10 },
  { id: 'uni_30', emoji: '🦄', name: 'Légende Pure', desc: '30 Licornes', check: (s, g) => g.unicorn >= 30 },
  { id: 'drag_10', emoji: '🔥', name: 'Dresseur', desc: '10 Dragons', check: (s, g) => g.dragon >= 10 },
  { id: 'drag_30', emoji: '🐉', name: 'Maître des Cieux', desc: '30 Dragons', check: (s, g) => g.dragon >= 30 },
  { id: 'cast_10', emoji: '🧱', name: 'Bâtisseur', desc: '10 Châteaux', check: (s, g) => g.castle >= 10 },
  { id: 'cast_50', emoji: '🏰', name: 'Empereur', desc: '50 Châteaux', check: (s, g) => g.castle >= 50 },
  // Boss
  { id: 'boss_1', emoji: '🦴', name: 'Désherbage', desc: 'Vaincre la Fleur du Néant', check: (s, g) => s.defeatedBosses.includes('Fleur du Néant') },
  { id: 'boss_2', emoji: '🔨', name: 'Brise-Glace', desc: 'Vaincre le Titan de Cristal', check: (s, g) => s.defeatedBosses.includes('Titan de Cristal') },
  { id: 'boss_3', emoji: '🌑', name: 'Exorciste', desc: 'Vaincre le Gardien des Ombres', check: (s, g) => s.defeatedBosses.includes('Gardien des Ombres') },
  { id: 'boss_4', emoji: '☀️', name: 'Extincteur', desc: 'Vaincre le Phénix Solaire', check: (s, g) => s.defeatedBosses.includes('Phénix Solaire') },
  { id: 'boss_5', emoji: '🗡️', name: 'Héros Épique', desc: 'Vaincre l\'Hydre d\'Émeraude', check: (s, g) => s.defeatedBosses.includes('Hydre d\'Émeraude') },
  { id: 'boss_6', emoji: '👁️', name: 'BENEDICTION', desc: 'Recevoir l\'onction du Dieu des Étoiles', check: (s, g) => s.defeatedBosses.includes('Ancien Dieu des Étoiles') },
  // Divers
  { id: 'comet_1', emoji: '🌠', name: 'Voeu exaucé', desc: 'Cliquer sur une comète', check: (s, g) => s.cometsClicked >= 1 },
  { id: 'all_gens', emoji: '🏬', name: 'Collectionneur', desc: 'Avoir au moins 1 de chaque bâtiment', check: (s, g) => Object.values(g).every(v => v > 0) },
  { id: 'ps_high', emoji: '🚀', name: 'Vitesse Lumière', desc: 'Produire 5k/sec', check: (s, g) => getPS() >= 5000 },
  { id: 'ps_ultra', emoji: '🌌', name: 'Big Bang', desc: 'Produire 50k/sec', check: (s, g) => getPS() >= 50000 },
  { id: 'starter', emoji: '🥉', name: 'Premiers pas', desc: 'Acheter son premier bâtiment', check: (s, g) => Object.values(g).some(v => v > 0) },
  { id: 'comet_leg', emoji: '🌟', name: 'Élu des Astres', desc: 'Trouver une comète légendaire', check: (s, g) => s.unlockedLegendary === true },
  { id: 'comet_1', emoji: '🌠', name: 'Voeu exaucé', desc: 'Cliquer sur une comète', check: (s, g) => s.cometsClicked >= 1 }

];

let state = { score: 0, defeatedBosses: [], clicks: 0, unlockedAchievements: [], cometsClicked: 0, unlockedLegendary: false };
let gens = { fleur: 0, wand: 0, fairy: 0, unicorn: 0, dragon: 0, castle: 0 };

const fmtCompact = n => { 
  if (n >= 1000000000) return (n/1000000000).toFixed(2)+'B'; 
  if (n >= 1000000) return (n/1000000).toFixed(2)+'M'; 
  if (n >= 1000) return (n/1000).toFixed(1)+'k'; 
  return Math.floor(n); 
};
const fmtPrecise = n => n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function notify(text) { 
  const container = document.getElementById('toast-container'); 
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = text; 
  container.appendChild(t); setTimeout(() => t.remove(), 3000); 
}

function getPS() { return GEN_DATA.reduce((acc, g) => acc + (gens[g.id] * g.base), 0); }
function getClickPower() { return Math.max(1, Math.floor(getPS() * 0.1)); }

function checkAchievements() {
  ACHIEVEMENTS_DATA.forEach(ach => {
    if (!state.unlockedAchievements.includes(ach.id) && ach.check(state, gens)) {
      state.unlockedAchievements.push(ach.id);
      notify("🏆 SUCCÈS : " + ach.name);
    }
  });
}

function updateUI() {
  document.getElementById('headerScore').textContent = fmtPrecise(state.score);
  document.getElementById('score').textContent = fmtCompact(state.score);
  document.getElementById('totalClicks').textContent = state.clicks.toLocaleString();
  document.getElementById('perSec').textContent = getPS().toLocaleString();
  document.getElementById('clickVal').textContent = fmtCompact(getClickPower());
  
  const lastBoss = state.defeatedBosses[state.defeatedBosses.length - 1];
  document.getElementById('storyText').textContent = lastBoss ? STORY_DATA[lastBoss] : STORY_DATA['start'];

  document.getElementById('genList').innerHTML = GEN_DATA.map(g => {
    let price = Math.floor(g.cost * Math.pow(1.15, gens[g.id]));
    return `<div class="list-item ${state.score < price ? 'cant-afford' : ''}" onclick="buy('${g.id}', ${price})"><div class="item-icon">${g.emoji}</div><div class="item-info"><div class="item-name">${g.name}</div><div class="item-cost">🪙 ${fmtCompact(price)}</div></div><div class="item-count">${gens[g.id]}</div></div>`;
  }).join('');

  const bossArea = document.getElementById('BossList');
  const nextBoss = BOSS_DATA.find(b => !state.defeatedBosses.includes(b.id));
  if (!nextBoss) bossArea.innerHTML = "<div style='color:var(--green); font-weight:800; text-align:center;'>🌌 LÉGENDE TERMINÉE 🌌</div>";
  else {
    let reqs = [];
    if (nextBoss.id === 'Gardien des Ombres') { if(gens.dragon < 30) reqs.push("30 Dragons"); if(state.clicks < 3000) reqs.push("3k Clics"); }
    if (nextBoss.id === 'Ancien Dieu des Étoiles') { if(gens.castle < 50) reqs.push("50 Châteaux"); if(state.clicks < 10000) reqs.push("10k Clics"); }
    const canFight = state.score >= nextBoss.cost && reqs.length === 0;
    bossArea.innerHTML = `<div class="list-item ${!canFight ? 'cant-afford' : ''}" onclick="fightBoss('${nextBoss.id}', ${nextBoss.cost}, '${reqs.join(', ')}')"><div class="item-icon">${nextBoss.emoji}</div><div class="item-info"><div class="item-name">${nextBoss.name}</div><div class="item-cost">⚔️ ${fmtCompact(nextBoss.cost)} ${reqs.length > 0 ? `<br><span style="color:#ef4444;font-size:0.75rem;">Requis: ${reqs.join(' & ')}</span>` : ''}</div></div></div>`;
  }

  document.getElementById('achCount').textContent = state.unlockedAchievements.length;
  document.getElementById('SuccesList').innerHTML = ACHIEVEMENTS_DATA.map(ach => {
    const isUnlocked = state.unlockedAchievements.includes(ach.id);
    return `<div class="achievement-item ${isUnlocked ? 'unlocked' : ''}"><div class="ach-icon">${isUnlocked ? ach.emoji : '🔒'}</div><div class="ach-info"><div class="ach-name">${ach.name}</div><div class="ach-desc">${ach.desc}</div></div></div>`;
  }).join('');
}

function buy(id, cost) { if (state.score >= cost) { state.score -= cost; gens[id]++; checkAchievements(); updateUI(); } }
function fightBoss(id, cost, reqs) { if (reqs === "" && state.score >= cost) { state.score -= cost; state.defeatedBosses.push(id); checkAchievements(); updateUI(); saveGame(); notify("⚔️ Victoire !"); } else if (reqs !== "") notify("⚠️ Requis : " + reqs); }

document.getElementById('clickBtn').onclick = () => { state.score += getClickPower(); state.clicks++; checkAchievements(); const s = document.getElementById('score'); s.classList.remove('pop'); void s.offsetWidth; s.classList.add('pop'); updateUI(); };
function saveGame() { localStorage.setItem('starSave_v2', JSON.stringify({ state, gens })); }
function loadGame() { const saved = localStorage.getItem('starSave_v2'); if (saved) { const d = JSON.parse(saved); Object.assign(state, d.state); Object.assign(gens, d.gens); } }

setInterval(() => { state.score += getPS() / 10; checkAchievements(); updateUI(); saveGame(); }, 100);

function spawnComet(isFirstLoad = false) {
  const now = Date.now();
  const nextSpawn = parseInt(localStorage.getItem('nextCometTime')) || 0;
  if (isFirstLoad && now < nextSpawn) { setTimeout(() => spawnComet(), nextSpawn - now); return; }
  if (state.score < 1000) { setTimeout(() => spawnComet(), 10000); return; }
  
  const isLegendary = Math.random() < 0.10;
  const c = document.createElement('div');
  c.className = 'comet';
  c.textContent = isLegendary ? '🌠' : '☄️';
  if (isLegendary) { c.style.filter = "drop-shadow(0 0 25px #ffd700) hue-rotate(45deg)"; c.style.fontSize = "4.5rem"; }

  c.onclick = () => { 
    state.cometsClicked++;
    if (isLegendary) state.unlockedLegendary = true;
    let multiplier = isLegendary ? 1800 : 180;
    let bonus = Math.max(5000, Math.floor(getPS() * multiplier)); 
    state.score += bonus; c.remove(); checkAchievements(); updateUI(); 
    notify((isLegendary ? "🌟 LÉGENDAIRE ! +" : "☄️ RARE ! +") + fmtCompact(bonus)); 
  };
  document.body.appendChild(c);
  setTimeout(() => { if(c.parentNode) c.remove(); }, 5000);
  let nextDelay = Math.random() * 40000 + 40000;
  localStorage.setItem('nextCometTime', now + nextDelay + 5000);
  setTimeout(() => spawnComet(), nextDelay);
}

loadGame(); updateUI(); spawnComet(true);
</script>
</body>
</html>
