<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔮 Grimoire des Âmes - Âge & Sourire Réels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: radial-gradient(circle at 10% 20%, #0a0b1a, #02010a);
            min-height: 100vh;
            padding: 20px;
            color: #e8e2ff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(8, 10, 25, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 25px;
            border: 1px solid rgba(170, 140, 255, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f9efb2, #c394ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            text-align: center;
            color: #baacff;
            margin-bottom: 30px;
            font-style: italic;
        }

        .dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .glass-card {
            background: rgba(20, 22, 45, 0.65);
            backdrop-filter: blur(5px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(200, 180, 250, 0.3);
        }

        .webcam-area { text-align: center; }
        video {
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            border: 3px solid #bc9aff;
            transform: scaleX(-1);
            background: #000;
        }

        button {
            background: linear-gradient(105deg, #6541b3, #8d6ad8);
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 14px 28px;
            margin: 20px 12px 5px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #7957cf; }

        .result-arcanum {
            background: linear-gradient(145deg, #0c0f24, #040617);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 10px solid #b78eff;
        }

        .wiz-icon { font-size: 3.8rem; text-align: center; }
        .wiz-name {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #ffecb3, #d0b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .trait-badge {
            display: inline-block;
            background: #2a2355;
            padding: 5px 15px;
            border-radius: 30px;
            margin: 5px;
            font-size: 0.8rem;
        }
        .magic-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .stat-cell {
            background: #0e1029;
            padding: 8px 12px;
            border-radius: 20px;
        }
        .gauge {
            height: 8px;
            background: #332a5a;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .gauge-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #dbbaff, #9b6eff);
        }
        .affinity-box {
            text-align: center;
            background: #121634;
            border-radius: 24px;
            padding: 12px;
            margin-top: 16px;
        }
        .age-badge {
            display: inline-block;
            background: #6b4c9a;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 10px auto;
            font-weight: bold;
        }
        .line-break {
            margin-top: 20px;
            border-top: 1px dashed #6a5a9e;
            padding-top: 15px;
        }
        @media (max-width: 850px) { .dual-grid { grid-template-columns: 1fr; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 LE GRIMOIRE DES ÂMES MAGIQUES 🔮</h1>
    <div class="sub">« Sourire réel + estimation d'âge basée sur traits du visage »</div>
    <div class="dual-grid">
        <div class="glass-card webcam-area">
            <h3>📸 Cercle de Vérité</h3>
            <video id="webcam" autoplay playsinline muted></video>
            <div>
                <button id="revealBtn">✨ SCRUTER L'ÂME MAGIQUE ✨</button>
                <button id="resetBtn" style="background:#3a2d64;">🌀 Nouvelle analyse</button>
            </div>
            <p style="font-size:0.75rem; margin-top:12px;">Détection couleur lèvres + rapport front/menton pour l'âge. Sour力的 accuracy ++</p>
        </div>
        <div class="glass-card" id="resultContainer">
            <div class="result-arcanum">
                <div class="wiz-icon">🌙🔮</div>
                <div class="wiz-name">Attente du rituel</div>
                <div style="text-align:center; margin:12px">Activez la scrutation. Sourirez-vous ? L'âge magique sera dévoilé.</div>
            </div>
            <div id="statsDetails"></div>
        </div>
    </div>
</div>

<script>
    const ARCANES = {
        LUMINA: { name: "Lumina, Éclat Originel", icon: "☀️✨", traits: ["Bienveillant","Rayonnant","Sacré"], desc: "Âme lumineuse, vos sorts soignent.", stats: { Lueur:94, Empathie:96 }, affinite: "Lumière", conseil: "Partagez votre flamme." },
        IGNIS: { name: "Ignis, Brasier", icon: "🔥🐉", traits: ["Ferveur","Volcanique"], desc: "La passion vous consume.", stats: { Pyrique:96, Volonté:93 }, affinite: "Pyromancie", conseil: "Domptez votre fougue." },
        UMBRA: { name: "Umbra, Silhouette", icon: "🌑🦇", traits: ["Furtif","Malicieux"], desc: "Les ombres vous chuchotent.", stats: { Discrétion:97, Ruse:91 }, affinite: "Ténèbres", conseil: "Un rayon de lumière vous renforce." },
        AETHERIEL: { name: "Aethériel, Souffle", icon: "🌀✨", traits: ["Visionnaire","Intemporel"], desc: "Vous naviguez entre les plans.", stats: { Clairvoyance:92, Intuition:95 }, affinite: "Astral", conseil: "Ancrez-vous régulièrement." },
        SYLVANIS: { name: "Sylvanis, Voix des racines", icon: "🌿🍄", traits: ["Vivace","Guérisseur"], desc: "La forêt palpite en vous.", stats: { Essence:95, Symbiose:97 }, affinite: "Géomancie", conseil: "Marchez pieds nus." },
        MORTAVIS: { name: "Mortavis, Gardien", icon: "💀⚰️", traits: ["Calme","Médium"], desc: "Mémoires défuntes.", stats: { Sagesse:93, Mémoire:94 }, affinite: "Nécromancie", conseil: "Vivez le présent." },
        GLACIEL: { name: "Glaciel, Givre", icon: "❄️🗡️", traits: ["Rigoureux","Logique"], desc: "Sagesse des cimes.", stats: { Concentration:98, SangFroid:96 }, affinite: "Cryomancie", conseil: "Faites fondre votre cœur." },
        TEMPESTA: { name: "Tempesta, Fureur", icon: "🌩️⚡", traits: ["Imprévisible","Aérien"], desc: "L'orage vibre.", stats: { Foudre:94, Rapidité:92 }, affinite: "Aéromancie", conseil: "Recentrez-vous." }
    };

    let video, canvas, previousFrame = null, stream = null;
    let smileHistory = [], movementHistory = [];
    let faceCascade = null; // simulacre (pas de librairie, mais analyse basique)

    async function initCamera() {
        video = document.getElementById('webcam');
        try {
            const str = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = str;
            stream = str;
            await new Promise(r => { video.onloadedmetadata = r; });
            video.play();
            canvas = document.createElement('canvas');
            return true;
        } catch(e) { 
            document.getElementById('resultContainer').innerHTML = `<div style="color:#ffab7b">❌ Caméra inaccessible. HTTPS requis.</div>`;
            return false; 
        }
    }

    function captureFrame() {
        if (!video || video.readyState < 2) return null;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    // Détection sourire (couleur des lèvres + ouverture)
    function detectSmileReal(imageData, width, height) {
        // Zone de la bouche approximative (40% à 65% hauteur)
        const mouthY1 = Math.floor(height * 0.55);
        const mouthY2 = Math.floor(height * 0.7);
        const mouthX1 = Math.floor(width * 0.35);
        const mouthX2 = Math.floor(width * 0.65);
        
        let redSum = 0, greenSum = 0, blueSum = 0, totalPix = 0;
        for(let y = mouthY1; y < mouthY2; y++) {
            for(let x = mouthX1; x < mouthX2; x++) {
                const idx = (y * width + x) * 4;
                redSum += imageData.data[idx];
                greenSum += imageData.data[idx+1];
                blueSum += imageData.data[idx+2];
                totalPix++;
            }
        }
        const rAvg = redSum/totalPix;
        const gAvg = greenSum/totalPix;
        const bAvg = blueSum/totalPix;
        // Une bouche souriante est plus rouge et moins bleue/verte
        const redDominance = (rAvg - (gAvg+bAvg)/2);
        let smileScore = Math.min(100, Math.max(0, (redDominance / 50) * 100));
        if(smileScore > 70) smileScore = 60 + (smileScore-60)*0.8;
        return Math.floor(smileScore);
    }

    function computeMovement(prev, curr, w, h) {
        if (!prev) return 0;
        let diff = 0, total = 0;
        for (let i = 0; i < w * h; i+=20) {
            const idx = i*4;
            const rDiff = Math.abs(prev.data[idx] - curr.data[idx]);
            const gDiff = Math.abs(prev.data[idx+1] - curr.data[idx+1]);
            const bDiff = Math.abs(prev.data[idx+2] - curr.data[idx+2]);
            diff += (rDiff+gDiff+bDiff)/3;
            total++;
        }
        return Math.min(100, Math.floor(diff / total / 2.55));
    }

    // Estimation âge: rapports front/menton + texture
    function estimateAgeFromFace(imageData, width, height) {
        // Détection simplifiée: luminance verticale (front plus lumineux)
        const eyeLevel = Math.floor(height * 0.45);
        const foreheadLevel = Math.floor(height * 0.2);
        const chinLevel = Math.floor(height * 0.75);
        
        let foreheadLum = 0, chinLum = 0, fCount = 0, cCount = 0;
        for(let x = Math.floor(width*0.3); x < Math.floor(width*0.7); x++) {
            let idxF = (foreheadLevel * width + x) * 4;
            let idxC = (chinLevel * width + x) * 4;
            foreheadLum += (imageData.data[idxF] + imageData.data[idxF+1] + imageData.data[idxF+2])/3;
            chinLum += (imageData.data[idxC] + imageData.data[idxC+1] + imageData.data[idxC+2])/3;
            fCount++; cCount++;
        }
        foreheadLum /= fCount;
        chinLum /= cCount;
        const ratio = foreheadLum / (chinLum + 0.01);
        
        // Texture fine: variance régionale
        let textureValue = 0;
        let txCount = 0;
        for(let y = eyeLevel-20; y < eyeLevel+20 && y<height-1; y++) {
            for(let x = Math.floor(width*0.4); x < Math.floor(width*0.6); x++) {
                const idx = (y*width + x)*4;
                const idx2 = ((y+1)*width + x)*4;
                const diff = Math.abs(imageData.data[idx] - imageData.data[idx2]) + 
                             Math.abs(imageData.data[idx+1] - imageData.data[idx2+1]) +
                             Math.abs(imageData.data[idx+2] - imageData.data[idx2+2]);
                textureValue += diff;
                txCount++;
            }
        }
        textureValue = textureValue / txCount / 3;
        
        let ageEstimate = 20 + (1 - Math.min(1.2, ratio)) * 55; // front moins lumineux = plus vieux
        ageEstimate += (textureValue * 0.5);
        ageEstimate = Math.floor(Math.min(75, Math.max(16, ageEstimate)));
        return ageEstimate;
    }

    function colorMood(imageData, w, h) {
        let rTot=0,gTot=0,bTot=0,total=0;
        for(let i=0; i<w*h; i+=10) {
            const idx = i*4;
            rTot+=imageData.data[idx]; gTot+=imageData.data[idx+1]; bTot+=imageData.data[idx+2];
            total++;
        }
        const rAvg=rTot/total/255, gAvg=gTot/total/255, bAvg=bTot/total/255;
        const brightness = (rAvg+gAvg+bAvg)/3;
        let dominant = (rAvg>gAvg && rAvg>bAvg) ? "Rouge" : (gAvg>rAvg && gAvg>bAvg) ? "Vert" : "Bleu";
        if(Math.abs(rAvg-gAvg)<0.08 && Math.abs(gAvg-bAvg)<0.08) dominant = "Violette";
        return { brightness: Math.floor(brightness*100), dominant };
    }

    function ageCategoryAndGift(age, wizardKey) {
        let category = "", gift = "";
        if(age < 22) { category = "👶 Jeune prodige magique"; gift = "Mana++ & sorts imprévisibles."; }
        else if(age < 35) { category = "🧙‍♂️ Sorcier de l'âge adulte"; gift = "Énergie vitale florissante."; }
        else if(age < 55) { category = "📖 Mage d'expérience"; gift = "Maîtrise et emprise mentale accrues."; }
        else { category = "🕯️ Archimage vénérable"; gift = "Mémoire ancestrale et sagesse des âges."; }
        return { category, gift };
    }

    function ultimateAnalysis(imageData, prevImageData, width, height) {
        const smileVal = detectSmileReal(imageData, width, height);
        const movement = computeMovement(prevImageData, imageData, width, height);
        const col = colorMood(imageData, width, height);
        const magicAge = estimateAgeFromFace(imageData, width, height);
        
        smileHistory.push(smileVal); if(smileHistory.length>6) smileHistory.shift();
        movementHistory.push(movement); if(movementHistory.length>5) movementHistory.shift();
        const avgSmile = smileHistory.reduce((a,b)=>a+b,0)/smileHistory.length;
        const avgMovement = movementHistory.reduce((a,b)=>a+b,0)/movementHistory.length;

        let wizardKey = "AETHERIEL";
        if(avgSmile > 58 && col.brightness > 50) wizardKey = "LUMINA";
        else if(avgSmile < 28 && col.brightness<42) wizardKey = "UMBRA";
        else if(col.dominant === "Rouge" && avgMovement>25) wizardKey = "IGNIS";
        else if(col.dominant === "Vert") wizardKey = "SYLVANIS";
        else if(col.brightness < 38) wizardKey = "MORTAVIS";
        else if(col.dominant === "Bleu" && magicAge>40) wizardKey = "GLACIEL";
        else if(avgMovement > 55) wizardKey = "TEMPESTA";
        
        if(magicAge > 60) wizardKey = "MORTAVIS";
        if(magicAge < 25 && wizardKey === "MORTAVIS") wizardKey = "AETHERIEL";
        
        const arc = ARCANES[wizardKey];
        const ageMagic = ageCategoryAndGift(magicAge, wizardKey);
        const bonusGift = ` ${ageMagic.gift} ${generateSpecialGift(wizardKey, smileVal, movement)}`;
        
        return { wizard: arc, metrics: { sourire: Math.floor(avgSmile), mouvement: avgMovement, age: magicAge, ageCat: ageMagic.category, donBonus: bonusGift, luminosite: col.brightness, dominant: col.dominant } };
    }

    function generateSpecialGift(key, smile, move) {
        const gifts = { LUMINA:`Rayon d'espoir (sourire ${smile}%)`, IGNIS:`Fougue ${move}%`, UMBRA:"Voile discret", AETHERIEL:"Préscience onirique", SYLVANIS:"Bourgeon instantané", MORTAVIS:"Parade spectrale", GLACIEL:"Gel protecteur", TEMPESTA:"Cri des cieux" };
        return gifts[key] || "Lien stellaire";
    }

    async function performReading() {
        const curr = captureFrame();
        if(!curr) { alert("Caméra non dispo"); return; }
        const prev = previousFrame || curr;
        const analysis = ultimateAnalysis(curr, prev, curr.width, curr.height);
        previousFrame = curr;
        renderResult(analysis);
        if(navigator.vibrate) navigator.vibrate(80);
    }

    function renderResult(a) {
        const w = a.wizard, m = a.metrics;
        const container = document.getElementById('resultContainer');
        container.innerHTML = `
            <div class="result-arcanum">
                <div class="wiz-icon">${w.icon}</div>
                <div class="wiz-name">${w.name}</div>
                <div style="text-align:center;"><span class="age-badge">${m.ageCat} — ${m.age} ans magiques</span></div>
                <div style="text-align:center; margin:8px 0">${w.traits.map(t=>`<span class="trait-badge">${t}</span>`).join('')}</div>
                <div>${w.desc}</div>
            </div>
            <div class="magic-stats-grid">
                <div class="stat-cell"><span>😊 Sourire (réel)</span><span>${m.sourire}%</span><div class="gauge"><div class="gauge-fill" style="width:${m.sourire}%"></div></div></div>
                <div class="stat-cell"><span>🌀 Mouvement</span><span>${m.mouvement}%</span><div class="gauge"><div class="gauge-fill" style="width:${m.mouvement}%"></div></div></div>
                <div class="stat-cell"><span>✨ Luminosité aura</span><span>${m.luminosite}%</span><div class="gauge"><div class="gauge-fill" style="width:${m.luminosite}%"></div></div></div>
                <div class="stat-cell"><span>🎨 Couleur dominante</span><span>${m.dominant}</span></div>
                <div class="stat-cell"><span>📅 Âge estimé</span><span>${m.age} ans</span></div>
            </div>
            <div class="line-break"></div>
            <div class="affinity-box">
                🔮 Affinité : ${w.affinite}<br>
                🎁 Don occulte : ${m.donBonus}<br>
                ✨ Conseil : ${w.conseil}
            </div>
            <div class="line-break"></div>
            <div style="font-size:0.7rem; text-align:center;">Analyse basée sur la couleur des lèvres, le front/menton et la texture.</div>
        `;
    }

    document.getElementById('revealBtn').onclick = async () => {
        const btn = document.getElementById('revealBtn');
        btn.disabled = true; btn.innerHTML = "🔍 Lecture...";
        await new Promise(r => setTimeout(r, 600));
        await performReading();
        btn.disabled = false; btn.innerHTML = "✨ SCRUTER L'ÂME MAGIQUE ✨";
    };
    document.getElementById('resetBtn').onclick = () => { smileHistory=[]; movementHistory=[]; previousFrame=null; location.reload(); };

    window.addEventListener('load', initCamera);
    window.addEventListener('beforeunload',()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); });
</script>
</body>
</html>
