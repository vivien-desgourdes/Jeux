<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Grimoire des Sorciers - Quel sorcier êtes-vous ?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .subtitle {
            text-align: center;
            color: #c9a3dc;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .webcam-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        
        video, canvas {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        canvas {
            display: none;
        }
        
        video {
            background: #000;
        }
        
        .result-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
        }
        
        .wizard-card {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a0a2e 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 2px solid #ffd700;
            margin-bottom: 20px;
        }
        
        .wizard-emoji {
            font-size: 4em;
            margin-bottom: 10px;
        }
        
        .wizard-name {
            font-size: 1.8em;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .wizard-desc {
            color: #ddd;
            line-height: 1.6;
        }
        
        .stats {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            color: #c9a3dc;
        }
        
        button {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            color: #1a0a2e;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            text-align: center;
            color: #ffd700;
            font-size: 1.2em;
            margin: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
            
            h1 { font-size: 1.8em; }
        }
        
        .permission-warning {
            background: rgba(255,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Grimoire des Sorciers 🔮</h1>
        <div class="subtitle">"L'appareil photo révèle votre véritable nature magique"</div>
        
        <div class="game-area">
            <div class="webcam-panel">
                <h3 style="color:#ffd700; margin-bottom:15px">📸 Regardez la caméra</h3>
                <video id="webcam" autoplay playsinline muted></video>
                <div style="margin-top: 20px;">
                    <button id="revealBtn">✨ Révéler mon type de sorcier ✨</button>
                </div>
            </div>
            
            <div class="result-panel">
                <div id="resultArea">
                    <div class="wizard-card">
                        <div class="wizard-emoji">❓</div>
                        <div class="wizard-name">Sorcier en devenir</div>
                        <div class="wizard-desc">Cliquez sur "Révéler mon type" pour découvrir votre véritable nature magique !</div>
                    </div>
                    <div class="stats" id="statsArea">
                        <div class="stat-item">✨ En attente d'analyse...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button id="retryBtn" style="background: #4a2e6b; color:#ffd700;">🔮 Nouvelle prédiction 🔮</button>
        </div>
    </div>
    
    <script>
        let videoStream = null;
        let video = null;
        
        // Les différents types de sorciers
        const wizardTypes = {
            'SORCIER_DE_LA_LUMIERE': {
                emoji: '☀️✨',
                name: 'Sorcier de la Lumière',
                description: 'Vous rayonnez d\'énergie positive ! Votre magie est pure et éclatante comme le soleil. Vous excellez dans les sorts de guérison et de protection.',
                color: '#ffd700'
            },
            'SORCIER_DE_LA_NUIT': {
                emoji: '🌙🦉',
                name: 'Sorcier de la Nuit',
                description: 'L\'obscurité vous est familière ! Vous tirez votre puissance des ombres et des mystères. Maître des sorts d\'illusion et de discrétion.',
                color: '#8b6b9d'
            },
            'SORCIER_ROUGE_DRAGON': {
                emoji: '🐉🔥',
                name: 'Sorcier Dragon Rouge',
                description: 'Votre passion est légendaire ! Comme un dragon, votre magie est puissante et intense. Spécialiste des sorts de feu et de force brute.',
                color: '#ff4444'
            },
            'SORCIER_ANGE_VERT': {
                emoji: '🍃🌿',
                name: 'Sorcier Ange de la Forêt',
                description: 'Vous avez l\'âme d\'un druide ! La nature vous parle et les plantes vous obéissent. Votre magie verte apporte vie et croissance.',
                color: '#44ff44'
            },
            'SORCIER_OCEAN_BLEU': {
                emoji: '🌊💙',
                name: 'Sorcier Océan Bleu',
                description: 'Calme en apparence mais puissant en profondeur ! Comme l\'océan, votre magie est à la fois apaisante et dévastatrice. Maître des éléments liquides.',
                color: '#4488ff'
            },
            'SORCIER_MYSTIQUE_VIOLET': {
                emoji: '🔮✨',
                name: 'Sorcier Mystique Violet',
                description: 'Votre magie est rare et puissante ! Vous avez un lien spécial avec les dimensions supérieures. Spécialiste de la divination et des sortilèges mystiques.',
                color: '#aa66ff'
            }
        };
        
        async function initCamera() {
            try {
                video = document.getElementById('webcam');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                videoStream = stream;
                return true;
            } catch(err) {
                console.error('Erreur caméra:', err);
                document.getElementById('resultArea').innerHTML = `
                    <div class="permission-warning">
                        ❌ Impossible d'accéder à la caméra.<br>
                        Vérifiez les permissions dans votre navigateur.
                    </div>
                `;
                return false;
            }
        }
        
        function captureImage() {
            if (!video || !video.videoWidth) return null;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            return ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
        
        function analyzeWizardType(imageData) {
            let rSum = 0, gSum = 0, bSum = 0;
            let totalPixels = 0;
            
            // Analyser les couleurs de l'image
            for(let i = 0; i < imageData.data.length; i += 4) {
                rSum += imageData.data[i];
                gSum += imageData.data[i + 1];
                bSum += imageData.data[i + 2];
                totalPixels++;
            }
            
            const rAvg = rSum / totalPixels / 255;
            const gAvg = gSum / totalPixels / 255;
            const bAvg = bSum / totalPixels / 255;
            
            // Calculer la luminosité
            const brightness = (rAvg + gAvg + bAvg) / 3;
            
            // Déterminer la couleur dominante
            let dominantColor = '';
            const maxColor = Math.max(rAvg, gAvg, bAvg);
            if(maxColor === rAvg) dominantColor = 'red';
            else if(maxColor === gAvg) dominantColor = 'green';
            else dominantColor = 'blue';
            
            // Générer des données aléatoires basées sur l'image pour plus de variété
            const seed = (rSum + gSum + bSum) % 100;
            
            // Déterminer le type de sorcier
            let wizardType;
            
            if(brightness > 0.6) {
                wizardType = 'SORCIER_DE_LA_LUMIERE';
            } else if(brightness < 0.3) {
                wizardType = 'SORCIER_DE_LA_NUIT';
            } else if(dominantColor === 'red') {
                wizardType = 'SORCIER_ROUGE_DRAGON';
            } else if(dominantColor === 'green') {
                wizardType = 'SORCIER_ANGE_VERT';
            } else if(dominantColor === 'blue') {
                wizardType = 'SORCIER_OCEAN_BLEU';
            } else {
                wizardType = 'SORCIER_MYSTIQUE_VIOLET';
            }
            
            // Ajouter un peu de randomisation basée sur l'image
            if(seed < 15 && wizardType === 'SORCIER_DE_LA_LUMIERE') {
                wizardType = 'SORCIER_MYSTIQUE_VIOLET';
            } else if(seed > 85 && wizardType === 'SORCIER_DE_LA_NUIT') {
                wizardType = 'SORCIER_OCEAN_BLEU';
            }
            
            return {
                type: wizardType,
                data: wizardTypes[wizardType],
                metrics: {
                    luminosite: Math.round(brightness * 100),
            couleurDominante: dominantColor === 'red' ? 'Rouge' : dominantColor === 'green' ? 'Vert' : dominantColor === 'blue' ? 'Bleu' : 'Mélangée',
                    intensiteMagique: Math.floor(40 + (brightness * 60)),
                    puissanceElementaire: Math.floor(30 + (Math.random() * 70)),
                    harmonieSpirituelle: Math.floor(50 + ((rAvg + gAvg + bAvg) / 3 * 50))
                }
            };
        }
        
        function displayWizardResult(analysis) {
            const resultArea = document.getElementById('resultArea');
            const wizard = analysis.data;
            const metrics = analysis.metrics;
            
            resultArea.innerHTML = `
                <div class="wizard-card" style="border-color: ${wizard.color}">
                    <div class="wizard-emoji">${wizard.emoji}</div>
                    <div class="wizard-name">${wizard.name}</div>
                    <div class="wizard-desc">${wizard.description}</div>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <span>✨ Niveau de luminosité magique</span>
                        <span>${metrics.luminosite}%</span>
                    </div>
                    <div class="stat-item">
                        <span>🎨 Couleur d'aura dominante</span>
                        <span>${metrics.couleurDominante}</span>
                    </div>
                    <div class="stat-item">
                        <span>⚡ Intensité de la magie</span>
                        <span>${metrics.intensiteMagique}/100</span>
                    </div>
                    <div class="stat-item">
                        <span>🌪️ Puissance élémentaire</span>
                        <span>${metrics.puissanceElementaire}/100</span>
                    </div>
                    <div class="stat-item">
                        <span>🕯️ Harmonie spirituelle</span>
                        <span>${metrics.harmonieSpirituelle}/100</span>
                    </div>
                    <div class="stat-item">
                        <span>📜 Prédiction spéciale</span>
                        <span>${getSpecialPrediction(analysis.type)}</span>
                    </div>
                </div>
            `;
            
            // Animation de révélation
            const card = document.querySelector('.wizard-card');
            card.style.transform = 'scale(0.95)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.transition = 'transform 0.5s';
            }, 50);
        }
        
        function getSpecialPrediction(wizardType) {
            const predictions = {
                'SORCIER_DE_LA_LUMIERE': 'Vous brillerez lors de la prochaine pleine lune !',
                'SORCIER_DE_LA_NUIT': 'Un mystère va bientôt se révéler à vous...',
                'SORCIER_ROUGE_DRAGON': 'Une grande passion va enflammer votre destin !',
                'SORCIER_ANGE_VERT': 'La nature vous offrira un cadeau inattendu !',
                'SORCIER_OCEAN_BLEU': 'Une vague de chance va vous emporter !',
                'SORCIER_MYSTIQUE_VIOLET': 'Les étoiles vous prédisent un grand pouvoir !'
            };
            return predictions[wizardType] || 'La magie réserve un destin extraordinaire !';
        }
        
        async function revealWizard() {
            const imageData = captureImage();
            if(!imageData) {
                alert("Veuillez patienter, la caméra initialise...");
                return;
            }
            
            // Effet de chargement
            const revealBtn = document.getElementById('revealBtn');
            const originalText = revealBtn.innerHTML;
            revealBtn.innerHTML = '<span class="spinner">🔮</span> Analyse magique en cours...';
            revealBtn.disabled = true;
            
            // Petite animation d'attente
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            const analysis = analyzeWizardType(imageData);
            displayWizardResult(analysis);
            
            revealBtn.innerHTML = originalText;
            revealBtn.disabled = false;
            
            // Ajouter un effet sonore virtuel avec vibration si disponible
            if(navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
        }
        
        function resetAndReveal() {
            revealWizard();
        }
        
        // Initialisation
        window.addEventListener('load', async () => {
            const cameraReady = await initCamera();
            if(cameraReady) {
                document.getElementById('revealBtn').addEventListener('click', revealWizard);
                document.getElementById('retryBtn').addEventListener('click', resetAndReveal);
            }
        });
        
        // Nettoyage
        window.addEventListener('beforeunload', () => {
            if(videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
