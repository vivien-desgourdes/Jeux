<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 STAR CLICKER</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #ffd234;
  --orange: #ff8c42;
  --pink:   #ff5fa0;
  --purple: #a855f7;
  --blue:   #3b82f6;
  --green:  #22c55e;
  --teal:   #06b6d4;
  --card-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.08);
  --card-radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #fff1fa 0%, #e8f4ff 50%, #f0fff4 100%);
  min-height: 100vh;
  color: #2d2d4e;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,210,52,0.18) 6px, transparent 6px),
    radial-gradient(circle, rgba(255,95,160,0.13) 4px, transparent 4px),
    radial-gradient(circle, rgba(59,130,246,0.12) 5px, transparent 5px),
    radial-gradient(circle, rgba(34,197,94,0.12) 3px, transparent 3px);
  background-size: 180px 180px, 130px 130px, 200px 200px, 150px 150px;
  background-position: 20px 30px, 90px 10px, 50px 100px, 140px 60px;
  pointer-events: none; z-index: 0;
}
#app {
  position: relative; z-index: 1;
  max-width: 1080px; margin: 0 auto; padding: 16px;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 14px;
}
header {
  grid-column: 1 / -1;
  background: white;
  border-radius: var(--card-radius);
  box-shadow: var(--card-shadow);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.logo {
  font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800;
  background: linear-gradient(135deg, var(--orange), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(2px 2px 0 rgba(255,140,66,0.2)); letter-spacing: 1px;
}
.header-coins { display: flex; align-items: center; gap: 14px; }
.coin-badge {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #fff9e0, #fff3c0);
  border: 2px solid var(--yellow); border-radius: 50px; padding: 8px 16px;
  box-shadow: 0 3px 0 rgba(255,180,0,0.3);
}
.coin-icon { font-size: 1.3rem; }
.coin-value { font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 800; color: #b45309; }
.pres-badge {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #fdf4ff, #f3e8ff);
  border: 2px solid var(--purple); border-radius: 50px; padding: 8px 16px;
  box-shadow: 0 3px 0 rgba(168,85,247,0.2);
}
.pres-value { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800; color: #7e22ce; }
.level-strip {
  grid-column: 1 / -1;
  background: white; border-radius: 14px; box-shadow: var(--card-shadow);
  padding: 12px 20px; display: flex; align-items: center; gap: 14px;
}
.lv-badge {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: white; font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 0.85rem;
  padding: 4px 14px; border-radius: 50px; white-space: nowrap;
  box-shadow: 0 3px 0 rgba(59,130,246,0.3);
}
.lv-bar-wrap { flex: 1; height: 12px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
.lv-bar-fill {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  transition: width 0.5s ease;
  box-shadow: 0 0 10px rgba(59,130,246,0.4);
}
.lv-next { font-size: 0.75rem; color: #94a3b8; font-weight: 700; white-space: nowrap; }
.main-area {
  background: white; border-radius: var(--card-radius); box-shadow: var(--card-shadow);
  padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 22px;
}
.score-number {
  font-family: 'Baloo 2', cursive; font-size: 4rem; font-weight: 800;
  color: #1e293b; line-height: 1; display: inline-block; transition: transform 0.08s;
}
.score-number.pop { transform: scale(1.07); }
.score-label { font-size: 0.85rem; color: #94a3b8; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
.star-btn-wrap { position: relative; width: 170px; height: 170px; display: flex; align-items: center; justify-content: center; }
.sparkles { position: absolute; inset: -10px; pointer-events: none; }
.sp {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  animation: spFloat linear infinite; opacity: 0.75;
}
.sp:nth-child(1){background:var(--pink);   top:8%;   left:2%;   animation-duration:2.1s; animation-delay:0s;  }
.sp:nth-child(2){background:var(--blue);   top:3%;   right:10%; animation-duration:2.8s; animation-delay:.4s; }
.sp:nth-child(3){background:var(--green);  bottom:6%;left:8%;   animation-duration:2.4s; animation-delay:.8s; }
.sp:nth-child(4){background:var(--purple); bottom:3%;right:5%;  animation-duration:2.6s; animation-delay:1.2s;}
.sp:nth-child(5){background:var(--yellow); top:50%;  left:-2%;  animation-duration:3s;   animation-delay:.2s; }
.sp:nth-child(6){background:var(--orange); top:50%;  right:-2%; animation-duration:2.3s; animation-delay:1s;  }
@keyframes spFloat {
  0%,100%{transform:translateY(0) scale(1);opacity:.7}
  50%{transform:translateY(-14px) scale(1.3);opacity:1}
}
.star-btn {
  width: 150px; height: 150px; border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(145deg, var(--yellow), var(--orange));
  box-shadow: 0 8px 0 #c96a00, 0 12px 30px rgba(255,140,66,0.4);
  font-size: 4rem; outline: none; position: relative; z-index: 1;
  transition: transform 0.08s, box-shadow 0.08s;
  animation: btnFloat 3s ease-in-out infinite;
}
@keyframes btnFloat {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.star-btn:hover {
  background: linear-gradient(145deg,#ffe04d,#ff9f55);
  box-shadow: 0 10px 0 #c96a00, 0 16px 40px rgba(255,140,66,0.5);
  animation: none; transform: translateY(-4px) scale(1.04);
}
.star-btn:active {
  transform: translateY(4px) scale(0.95) !important;
  box-shadow: 0 2px 0 #c96a00, 0 4px 16px rgba(255,140,66,0.3) !important;
  animation: none !important;
}
.click-stats { display: flex; gap: 24px; font-size: 0.9rem; font-weight: 700; color: #64748b; }
.click-stats span { color: var(--blue); font-family: 'Baloo 2', cursive; font-size: 1rem; }
.pres-wrap { width: 100%; max-width: 320px; }
.pres-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: #94a3b8; margin-bottom: 6px; }
.pres-track { height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
.pres-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 10px; transition: width .5s ease; }
.panel { background: white; border-radius: var(--card-radius); box-shadow: var(--card-shadow); padding: 18px; }
.panel-title { font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; color: #1e293b; margin-bottom: 14px; }
.gen-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; margin-bottom: 8px;
  background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 14px;
  cursor: pointer; transition: all .15s;
}
.gen-item:hover { border-color: var(--yellow); background: #fffbeb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,210,52,.2); }
.gen-item:active { transform: scale(0.98); }
.gen-item.cant-afford { opacity: .45; cursor: not-allowed; }
.gen-item.cant-afford:hover { border-color: #e2e8f0; background: #f8fafc; transform: none; box-shadow: none; }
.gen-emoji { font-size: 2rem; flex-shrink: 0; filter: drop-shadow(1px 2px 2px rgba(0,0,0,.1)); }
.gen-info { flex: 1; min-width: 0; }
.gen-name { font-family: 'Baloo 2', cursive; font-size: .9rem; font-weight: 700; color: #1e293b; }
.gen-desc { font-size: .7rem; color: #94a3b8; font-weight: 600; }
.gen-right { text-align: right; }
.gen-count { font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800; color: var(--blue); line-height: 1; }
.gen-cost-row { display: flex; align-items: center; gap: 3px; font-size: .72rem; font-weight: 700; color: #b45309; }
.upg-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; margin-bottom: 8px;
  background: #fdf4ff; border: 2px solid #e9d5ff; border-radius: 14px;
  cursor: pointer; transition: all .15s;
}
.upg-item:hover { border-color: var(--purple); background: #f5e8ff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(168,85,247,.2); }
.upg-item.cant-afford { opacity: .4; cursor: not-allowed; }
.upg-item.cant-afford:hover { transform: none; box-shadow: none; border-color: #e9d5ff; background: #fdf4ff; }
.upg-item.bought { opacity: .25; cursor: default; }
.upg-item.bought:hover { transform: none; box-shadow: none; }
.upg-emoji { font-size: 1.5rem; }
.upg-info { flex: 1; }
.upg-name { font-family: 'Baloo 2', cursive; font-size: .85rem; font-weight: 700; color: #6b21a8; }
.upg-desc { font-size: .68rem; color: #94a3b8; font-weight: 600; }
.upg-cost { font-family: 'Baloo 2', cursive; font-size: .8rem; font-weight: 800; color: #b45309; }
.pres-panel-inner { text-align: center; }
.pres-big { font-family: 'Baloo 2', cursive; font-size: 2.2rem; font-weight: 800; color: var(--purple); line-height: 1.1; }
.pres-sub { font-size: .8rem; color: #94a3b8; font-weight: 700; margin-bottom: 14px; }
.pres-preview {
  background: #fdf4ff; border: 2px dashed #d8b4fe; border-radius: 12px;
  padding: 10px; font-size: .78rem; font-weight: 700; color: #7e22ce; margin-bottom: 14px;
}
.btn-ascend {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  border: none; border-radius: 14px; color: white;
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
  letter-spacing: 1px; cursor: pointer;
  box-shadow: 0 5px 0 rgba(120,30,200,.3), 0 8px 20px rgba(168,85,247,.25);
  transition: all .1s;
}
.btn-ascend:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 0 rgba(120,30,200,.3), 0 14px 30px rgba(168,85,247,.35); }
.btn-ascend:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 rgba(120,30,200,.3); }
.btn-ascend:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: 0 4px 0 #cbd5e1; }
.ach-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; }
.ach-badge {
  aspect-ratio: 1; background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  cursor: default; filter: grayscale(1) opacity(.35); transition: all .3s; position: relative;
}
.ach-badge.unlocked {
  filter: none;
  background: linear-gradient(135deg,#fffbeb,#fef3c7); border-color: var(--yellow);
  box-shadow: 0 3px 0 rgba(255,180,0,.25), 0 0 12px rgba(255,210,52,.2);
  animation: achPop .5s cubic-bezier(.4,0,.2,1);
}
@keyframes achPop {
  0%{transform:scale(.7) rotate(-10deg)} 60%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1)}
}
.ach-badge .tip {
  display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: #1e293b; color: white; font-size: .65rem; font-weight: 700;
  padding: 6px 10px; border-radius: 8px; white-space: nowrap; z-index: 100; pointer-events: none;
}
.ach-badge:hover .tip { display: block; }
.float-num {
  position: fixed; pointer-events: none;
  font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800;
  color: var(--orange); text-shadow: 0 2px 4px rgba(0,0,0,.15);
  animation: numFloat .9s ease-out forwards; z-index: 500;
}
.float-num.crit { font-size: 1.5rem; color: var(--pink); text-shadow: 0 2px 8px rgba(255,95,160,.4); }
@keyframes numFloat {
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(.7)}
}
.notif {
  position: fixed; bottom: 24px; right: 24px;
  background: white; border-left: 5px solid var(--yellow); border-radius: 16px;
  padding: 14px 18px; max-width: 260px; z-index: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,.12);
  animation: notifIn .35s cubic-bezier(.4,0,.2,1), notifOut .3s 2.7s ease forwards;
}
.notif-title { font-family: 'Baloo 2', cursive; font-size: .85rem; font-weight: 800; color: #1e293b; margin-bottom: 3px; }
.notif-body { font-size: .78rem; color: #64748b; font-weight: 600; }
@keyframes notifIn { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes notifOut { to{transform:translateY(30px);opacity:0} }
.modal-bg {
  position: fixed; inset: 0; background: rgba(30,40,60,.5); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: white; border-radius: 28px; padding: 36px; text-align: center;
  max-width: 340px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-box .big-emoji { font-size: 3.5rem; margin-bottom: 12px; }
.modal-box h2 { font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
.modal-box .gain-num { font-family: 'Baloo 2', cursive; font-size: 2.5rem; font-weight: 800; color: var(--orange); margin: 12px 0; }
.modal-box p { font-size: .82rem; color: #64748b; font-weight: 600; margin-bottom: 20px; }
.modal-box button {
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  border: none; border-radius: 50px; color: white;
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 5px 0 rgba(200,100,0,.25), 0 8px 20px rgba(255,140,66,.3);
  transition: all .1s;
}
.modal-box button:hover { transform: translateY(-2px); }
.modal-box button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(200,100,0,.25); }
.crit-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(circle at center, rgba(255,95,160,.15), transparent 70%);
  pointer-events: none; z-index: 200;
  animation: critPop .4s ease-out forwards;
}
@keyframes critPop {
  0%{opacity:1;transform:scale(.8)} 40%{opacity:1;transform:scale(1.05)} 100%{opacity:0;transform:scale(1)}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}
@media(max-width:680px){
  #app{grid-template-columns:1fr}
  .score-number{font-size:3rem}
  .star-btn{width:120px;height:120px;font-size:3rem}
  .header-coins{gap:8px}
  .logo{font-size:1.3rem}
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">🌟 Star Clicker</div>
    <div class="header-coins">
      <div class="coin-badge">
        <div class="coin-icon">🪙</div>
        <div class="coin-value" id="scoreHeader">0</div>
      </div>
      <div class="pres-badge">
        <span>✨</span>
        <div class="pres-value" id="prestigeHeader">×1.0</div>
      </div>
    </div>
  </header>

  <div class="level-strip">
    <div class="lv-badge" id="levelBadge">Niveau 1</div>
    <div class="lv-bar-wrap"><div class="lv-bar-fill" id="levelBar" style="width:0%"></div></div>
    <div class="lv-next" id="levelNext">100</div>
  </div>

  <div class="main-area">
    <div style="text-align:center">
      <div class="score-number" id="score">0</div>
      <div class="score-label">⭐ étoiles collectées</div>
    </div>

    <div class="star-btn-wrap">
      <div class="sparkles">
        <div class="sp"></div><div class="sp"></div><div class="sp"></div>
        <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      </div>
      <button class="star-btn" id="clickBtn">⭐</button>
    </div>

    <div class="click-stats">
      <span><span id="perClick">1</span> / clic</span>
      <span><span id="perSec">0</span> / sec</span>
    </div>

    <div class="pres-wrap">
      <div class="pres-bar-label">
        <span>✨ Vers le prestige</span>
        <span id="prestigeProgress">0 / 10K</span>
      </div>
      <div class="pres-track"><div class="pres-fill" id="prestigeBar" style="width:0%"></div></div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:14px">

    <div class="panel">
      <div class="panel-title">⚙️ Générateurs</div>
      <div id="genList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">🔮 Améliorations</div>
      <div id="upgradeList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">✨ Prestige</div>
      <div class="pres-panel-inner">
        <div class="pres-big" id="prestigeDisplay">0</div>
        <div class="pres-sub" id="prestigeBonus">+0% bonus de production</div>
        <div class="pres-preview" id="prestigePreview">Atteignez 10 000 étoiles 🌟</div>
        <button class="btn-ascend" id="prestigeBtn">✨ Ascension !</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">🏆 Succès</div>
      <div class="ach-grid" id="achGrid"></div>
    </div>

  </div>
</div>

<div class="modal-bg" id="offlineModal">
  <div class="modal-box">
    <div class="big-emoji">🎉</div>
    <h2>Bon retour !</h2>
    <p>Tes étoiles ont continué à briller :</p>
    <div class="gain-num" id="offlineGain">+0</div>
    <p id="offlineTime"></p>
    <button onclick="closeModal()">Super ! Merci 🌟</button>
  </div>
</div>

<script>
const GEN_DATA = [
  {id:'wand',    emoji:'🪄', name:'Baguette magique',    desc:'Production de base',        base:1,    baseCost:50},
  {id:'fairy',   emoji:'🧚', name:'Fée étoilée',         desc:'Magie accélérée',           base:8,    baseCost:300},
  {id:'unicorn', emoji:'🦄', name:'Licorne',             desc:'Magie puissante',           base:47,   baseCost:2000},
  {id:'dragon',  emoji:'🐉', name:'Dragon doré',         desc:'Feu stellaire',             base:260,  baseCost:15000},
  {id:'castle',  emoji:'🏰', name:'Château des étoiles', desc:'Usine magique',             base:1400, baseCost:100000},
  {id:'galaxy',  emoji:'🌌', name:'Galaxie',             desc:'Puissance cosmique',        base:7800, baseCost:1e6},
];

const UPGRADES = [
  {id:'u1',emoji:'⭐',name:'Double éclat',     desc:'×2 par clic',     cost:500,    done:false,apply:()=>{clickMult*=2}},
  {id:'u2',emoji:'🪄',name:'Super Baguette',   desc:'Baguettes ×3',    cost:1000,   done:false,apply:()=>{boostGen('wand',3)}},
  {id:'u3',emoji:'🧚',name:'Fée turbo',        desc:'Fées ×3',         cost:8000,   done:false,apply:()=>{boostGen('fairy',3)}},
  {id:'u4',emoji:'💫',name:'Méga-éclat',       desc:'×4 par clic',     cost:25000,  done:false,apply:()=>{clickMult*=4}},
  {id:'u5',emoji:'🦄',name:'Licorne sacrée',   desc:'Licornes ×5',     cost:50000,  done:false,apply:()=>{boostGen('unicorn',5)}},
  {id:'u6',emoji:'🐉',name:'Rage du dragon',   desc:'Dragons ×4',      cost:200000, done:false,apply:()=>{boostGen('dragon',4)}},
  {id:'u7',emoji:'🏰',name:'Château enchanté', desc:'Châteaux ×5',     cost:1e6,    done:false,apply:()=>{boostGen('castle',5)}},
  {id:'u8',emoji:'🌌',name:'Nexus stellaire',  desc:'Tout ×2',         cost:5e6,    done:false,apply:()=>{Object.keys(genBoosts).forEach(k=>genBoosts[k]*=2)}},
];

const ACHIEVEMENTS = [
  {id:'a1', emoji:'⭐',label:'Premier clic !',     check:()=>totalClicks>=1},
  {id:'a2', emoji:'🌟',label:'100 étoiles',         check:()=>totalEarned>=100},
  {id:'a3', emoji:'🪄',label:'1ère baguette',       check:()=>gens.wand>=1},
  {id:'a4', emoji:'💥',label:'Coup critique !',     check:()=>critCount>=1},
  {id:'a5', emoji:'🚀',label:'1 000 étoiles',       check:()=>totalEarned>=1000},
  {id:'a6', emoji:'🧚',label:'1ère fée',            check:()=>gens.fairy>=1},
  {id:'a7', emoji:'💎',label:'10 000 étoiles',      check:()=>totalEarned>=10000},
  {id:'a8', emoji:'🦄',label:'1ère licorne',        check:()=>gens.unicorn>=1},
  {id:'a9', emoji:'✨',label:'1er prestige',        check:()=>prestige>=1},
  {id:'a10',emoji:'🐉',label:'1er dragon',          check:()=>gens.dragon>=1},
  {id:'a11',emoji:'🪄',label:'10 baguettes',        check:()=>gens.wand>=10},
  {id:'a12',emoji:'🌈',label:'1 million',           check:()=>totalEarned>=1e6},
  {id:'a13',emoji:'🏰',label:'1er château',         check:()=>gens.castle>=1},
  {id:'a14',emoji:'🌌',label:'1ère galaxie',        check:()=>gens.galaxy>=1},
  {id:'a15',emoji:'👑',label:'Prestige ×5',         check:()=>prestige>=5},
];

let score=0,totalEarned=0,prestige=0,clickMult=1,totalClicks=0,critCount=0;
let gens={},genCosts={},genBoosts={},achUnlocked=new Set();

GEN_DATA.forEach(g=>{gens[g.id]=0;genCosts[g.id]=g.baseCost;genBoosts[g.id]=1;});

function boostGen(id,m){genBoosts[id]=(genBoosts[id]||1)*m;}

function fmt(n){
  if(n>=1e15)return(n/1e15).toFixed(2)+'Q';
  if(n>=1e12)return(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return(n/1e9).toFixed(2)+'Md';
  if(n>=1e6) return(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function getPerSec(){
  let t=0;
  GEN_DATA.forEach(g=>t+=gens[g.id]*g.base*(genBoosts[g.id]||1));
  return t*clickMult*(1+prestige*0.25);
}
function getClickVal(){return Math.max(1,Math.floor(clickMult*(1+prestige*0.1)));}

function buildGenerators(){
  const c=document.getElementById('genList');c.innerHTML='';
  GEN_DATA.forEach(g=>{
    const d=document.createElement('div');
    d.className='gen-item';d.id='gen_'+g.id;
    d.innerHTML=`<div class="gen-emoji">${g.emoji}</div>
      <div class="gen-info"><div class="gen-name">${g.name}</div><div class="gen-desc">${g.desc}</div></div>
      <div class="gen-right"><div class="gen-count" id="gc_${g.id}">0</div>
      <div class="gen-cost-row">🪙 <span id="gco_${g.id}">${fmt(g.baseCost)}</span></div></div>`;
    d.onclick=()=>buyGen(g.id);c.appendChild(d);
  });
}

function buildUpgrades(){
  const c=document.getElementById('upgradeList');c.innerHTML='';
  UPGRADES.forEach(u=>{
    const d=document.createElement('div');
    d.className='upg-item';d.id='upg_'+u.id;
    d.innerHTML=`<div class="upg-emoji">${u.emoji}</div>
      <div class="upg-info"><div class="upg-name">${u.name}</div><div class="upg-desc">${u.desc}</div></div>
      <div class="upg-cost">🪙${fmt(u.cost)}</div>`;
    d.onclick=()=>buyUpgrade(u.id);c.appendChild(d);
  });
}

function buildAch(){
  const g=document.getElementById('achGrid');g.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const d=document.createElement('div');
    d.className='ach-badge';d.id='ach_'+a.id;
    d.innerHTML=`${a.emoji}<div class="tip">${a.label}</div>`;
    g.appendChild(d);
  });
}

document.getElementById('clickBtn').addEventListener('click',e=>{
  totalClicks++;
  const isCrit=Math.random()<0.05;
  const base=getClickVal();
  const gain=isCrit?base*10:base;
  score+=gain;totalEarned+=gain;
  if(isCrit){
    critCount++;
    spawnNum('⭐×10 SUPER!',e.clientX,e.clientY,'crit');
    const el=document.createElement('div');el.className='crit-overlay';
    document.body.appendChild(el);setTimeout(()=>el.remove(),400);
  }else{
    spawnNum('+'+fmt(gain)+'⭐',e.clientX,e.clientY,'');
  }
  const s=document.getElementById('score');
  s.classList.remove('pop');void s.offsetWidth;s.classList.add('pop');
  setTimeout(()=>s.classList.remove('pop'),100);
  updateUI();
});

function buyGen(id){
  const cost=genCosts[id];if(score<cost)return;
  score-=cost;gens[id]++;genCosts[id]=Math.floor(cost*1.15);updateUI();
}

function buyUpgrade(uid){
  const u=UPGRADES.find(x=>x.id===uid);
  if(!u||u.done||score<u.cost)return;
  score-=u.cost;u.done=true;u.apply();
  notify(u.emoji+' '+u.name,u.desc+' activé !');updateUI();
}

document.getElementById('prestigeBtn').onclick=()=>{
  if(score<10000)return;
  const gain=Math.floor(Math.sqrt(score/10000));
  prestige+=gain;
  notify('✨ Prestige !',`+${gain} pts de prestige gagnés !`);
  resetGame();updateUI();
};

function resetGame(){
  score=0;clickMult=1;
  GEN_DATA.forEach(g=>{gens[g.id]=0;genCosts[g.id]=g.baseCost;genBoosts[g.id]=1;});
  UPGRADES.forEach(u=>{u.done=false;});buildUpgrades();
}

function updateUI(){
  const ps=getPerSec(),cv=getClickVal();
  document.getElementById('score').textContent=fmt(score);
  document.getElementById('scoreHeader').textContent=fmt(score);
  document.getElementById('perSec').textContent=fmt(ps);
  document.getElementById('perClick').textContent=fmt(cv);
  document.getElementById('prestigeHeader').textContent='×'+(1+prestige*0.25).toFixed(2);
  document.getElementById('prestigeDisplay').textContent=prestige+' ✨';
  document.getElementById('prestigeBonus').textContent='+'+(prestige*25)+'% bonus';
  const pct=Math.min(100,(score/10000)*100);
  document.getElementById('prestigeBar').style.width=pct+'%';
  document.getElementById('prestigeProgress').textContent=fmt(score)+' / 10K';
  const pGain=score>=10000?'+'+Math.floor(Math.sqrt(score/10000))+' pts':'';
  document.getElementById('prestigePreview').textContent=
    score>=10000?`🎉 Reset pour gagner ${pGain} de prestige !`:`Atteignez 10 000 étoiles 🌟`;
  document.getElementById('prestigeBtn').disabled=score<10000;

  const level=Math.floor(1+Math.log10(Math.max(1,totalEarned)));
  const next=Math.pow(10,level),prev=Math.pow(10,level-1);
  const lp=Math.min(100,((totalEarned-prev)/(next-prev))*100);
  document.getElementById('levelBadge').textContent='Niveau '+level;
  document.getElementById('levelBar').style.width=lp+'%';
  document.getElementById('levelNext').textContent=fmt(next);

  GEN_DATA.forEach(g=>{
    const el=document.getElementById('gen_'+g.id);if(!el)return;
    document.getElementById('gc_'+g.id).textContent=gens[g.id];
    document.getElementById('gco_'+g.id).textContent=fmt(genCosts[g.id]);
    el.classList.toggle('cant-afford',score<genCosts[g.id]);
  });

  UPGRADES.forEach(u=>{
    const el=document.getElementById('upg_'+u.id);if(!el)return;
    el.classList.toggle('bought',u.done);
    if(!u.done)el.classList.toggle('cant-afford',score<u.cost);
    else el.classList.remove('cant-afford');
  });

  ACHIEVEMENTS.forEach(a=>{
    if(!achUnlocked.has(a.id)&&a.check()){
      achUnlocked.add(a.id);
      const el=document.getElementById('ach_'+a.id);
      if(el)el.classList.add('unlocked');
      notify('🏆 Succès débloqué !',a.label);
    }
  });
}

setInterval(()=>{
  const inc=getPerSec()/20;score+=inc;totalEarned+=inc;updateUI();
},50);

function spawnNum(text,x,y,cls){
  const el=document.createElement('div');
  el.className='float-num '+cls;el.textContent=text;
  el.style.left=(x+(Math.random()*30-15))+'px';el.style.top=(y-10)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function notify(title,body){
  const el=document.createElement('div');el.className='notif';
  el.innerHTML=`<div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}

function saveGame(){
  localStorage.setItem('star_save',JSON.stringify({
    score,totalEarned,prestige,clickMult,totalClicks,critCount,
    gens,genCosts,genBoosts,achUnlocked:[...achUnlocked],
    upgsDone:UPGRADES.filter(u=>u.done).map(u=>u.id)
  }));
  localStorage.setItem('star_time',Date.now());
}

function loadGame(){
  const raw=localStorage.getItem('star_save');if(!raw)return;
  try{
    const s=JSON.parse(raw);
    score=s.score||0;totalEarned=s.totalEarned||0;prestige=s.prestige||0;
    clickMult=s.clickMult||1;totalClicks=s.totalClicks||0;critCount=s.critCount||0;
    if(s.gens)Object.assign(gens,s.gens);
    if(s.genCosts)Object.assign(genCosts,s.genCosts);
    if(s.genBoosts)Object.assign(genBoosts,s.genBoosts);
    if(s.achUnlocked)s.achUnlocked.forEach(id=>{
      achUnlocked.add(id);
      const el=document.getElementById('ach_'+id);if(el)el.classList.add('unlocked');
    });
    if(s.upgsDone)s.upgsDone.forEach(uid=>{
      const u=UPGRADES.find(x=>x.id===uid);if(u){u.done=true;u.apply();}
    });
  }catch(e){}
}

function checkOffline(){
  const t=localStorage.getItem('star_time');if(!t)return;
  const diff=(Date.now()-parseInt(t))/1000;if(diff<30)return;
  const gain=Math.floor(getPerSec()*diff*0.5);if(gain<=0)return;
  score+=gain;totalEarned+=gain;
  document.getElementById('offlineGain').textContent='+'+fmt(gain)+' ⭐';
  document.getElementById('offlineTime').textContent=
    `Absent ${Math.floor(diff/60)}m ${Math.floor(diff%60)}s (50% d'efficacité)`;
  document.getElementById('offlineModal').classList.add('show');
}

function closeModal(){document.getElementById('offlineModal').classList.remove('show');}

setInterval(saveGame,3000);

buildGenerators();buildUpgrades();buildAch();loadGame();checkOffline();updateUI();
</script>
</body>
</html>
